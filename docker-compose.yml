services:
  brillante-php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME}-php
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/var/www
    networks:
      - brillante
    environment:
      PROJECT_NAME: ${PROJECT_NAME}

  brillante-nginx:
    image: nginx:alpine
    container_name: ${PROJECT_NAME}-nginx
    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - brillante-php
    networks:
      - brillante
      - app
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=app"

      - "traefik.http.routers.${PROJECT_NAME}.rule=Host(`${DOMAIN_NAME}`)"
      - "traefik.http.routers.${PROJECT_NAME}.entrypoints=https"
      - "traefik.http.routers.${PROJECT_NAME}.tls=true"
      - "traefik.http.routers.${PROJECT_NAME}.tls.certresolver=letsencrypt"
      - "traefik.http.services.${PROJECT_NAME}.loadbalancer.server.port=80"

      - "traefik.http.routers.${PROJECT_NAME}-http.rule=Host(`${DOMAIN_NAME}`)"
      - "traefik.http.routers.${PROJECT_NAME}-http.entrypoints=http"
      - "traefik.http.routers.${PROJECT_NAME}-http.middlewares=redirect-to-https"
      - "traefik.http.routers.${PROJECT_NAME}-http.service=brillante"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

  brillante-db:
    image: mysql:8.0
    container_name: ${PROJECT_NAME}-db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: aaa
    ports:
      - "3307:3306"
    labels:
      - traefik.enable=false
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - brillante

  brillante-phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ${PROJECT_NAME}-phpmyadmin
    environment:
      PMA_HOST: ${PROJECT_NAME}-db
      MYSQL_ROOT_PASSWORD: aaa
    depends_on:
      - ${PROJECT_NAME}-db
    networks:
      - brillante
      - app
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=app"

      - "traefik.http.routers.${PROJECT_NAME}-phpmyadmin.rule=Host(`${PHPMYADMIN_DOMAIN_NAME}`)"
      - "traefik.http.routers.${PROJECT_NAME}-phpmyadmin.entrypoints=https"
      - "traefik.http.routers.${PROJECT_NAME}-phpmyadmin.tls=true"
      - "traefik.http.routers.${PROJECT_NAME}-phpmyadmin.tls.certresolver=letsencrypt"
      - "traefik.http.services.${PROJECT_NAME}-phpmyadmin.loadbalancer.server.port=80"


      - "traefik.http.routers.${PROJECT_NAME}-phpmyadmin-http.rule=Host(`${PHPMYADMIN_DOMAIN_NAME}`)"
      - "traefik.http.routers.${PROJECT_NAME}-phpmyadmin-http.entrypoints=http"
      - "traefik.http.routers.${PROJECT_NAME}-phpmyadmin-http.middlewares=redirect-to-https"
      - "traefik.http.routers.${PROJECT_NAME}-phpmyadmin-http.service=brillante-phpmyadmin"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"


volumes:
  dbdata:

networks:
  app:
    external: true
  brillante:
    driver: bridge
